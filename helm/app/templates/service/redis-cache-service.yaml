# redis-cache-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.rediscache.service.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.rediscache.service.name }}
spec:
  ports:
    - port: {{ .Values.rediscache.service.port }}
      targetPort: {{ .Values.rediscache.service.port }}
      protocol: TCP
      name: {{ .Values.rediscache.service.name }}-port
  selector:
    app: {{ .Values.rediscache.service.name }}
  type: ClusterIP