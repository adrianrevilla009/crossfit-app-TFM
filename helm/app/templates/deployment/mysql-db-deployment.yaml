# mysql-db-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mysqldb.service.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: library
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.mysqldb.service.name }}
  replicas: 1
  template:
    metadata:
      labels:
        app: {{ .Values.mysqldb.service.name }}
    spec:
      restartPolicy: Always
      containers:
        - name: {{ .Values.mysqldb.service.name }}
          image: {{ .Values.mysqldb.service.image }}
          env:
            - name: MYSQL_DATABASE
              value: "classes"
            - name: MYSQL_ROOT_PASSWORD
              value: "password"
          ports:
            - containerPort: {{ .Values.mysqldb.service.port }}
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc