# mongo-db-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mongodb.service.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.mongodb.service.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mongodb.service.name }}
    spec:
      containers:
        - name: {{ .Values.mongodb.service.name }}
          image: {{ .Values.mongodb.service.image }}
          ports:
            - containerPort: {{ .Values.mongodb.service.port }}
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "adrian"
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: "password"
