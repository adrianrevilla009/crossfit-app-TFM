# mysql-db-security-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mysql-db-security-service.name }}
  namespace: development
spec:
  selector:
    app: {{ .Values.mysql-db-security-service.name }}
  ports:
    - protocol: TCP
      port: {{ .Values.mysql-db-security-service.port }}
      targetPort: {{ .Values.mysql-db-security-service.port }}
