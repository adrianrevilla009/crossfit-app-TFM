# redis-cache-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.redis-cache-service.name }}
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.redis-cache-service.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.redis-cache-service.name }}
    spec:
      containers:
        - name: {{ .Values.redis-cache-service.name }}
          image: redis
          ports:
            - containerPort: {{ .Values.redis-cache-service.port }}
