# mysql-db-security-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-db-security
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-db-security
  template:
    metadata:
      labels:
        app: mysql-db-security
    spec:
      containers:
        - name: mysql-db-security
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: security
            - name: MYSQL_ROOT_PASSWORD
              value: password
