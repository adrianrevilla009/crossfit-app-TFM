# zookeeper-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.zookeeper-service.name }}
  labels:
    app: {{ .Values.zookeeper-service.name }}
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.zookeeper-service.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.zookeeper-service.name }}
    spec:
      containers:
        - name: {{ .Values.zookeeper-service.name }}
          image: confluentinc/cp-zookeeper:7.0.1
          ports:
            - containerPort: {{ .Values.zookeeper-service.port }}
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
