server:
  global:
    scrape_interval: 15s

  serviceAccounts:
    server:
      automountServiceAccountToken: true

  persistence:
    enabled: true
    storageClass: standard
    size: 1Gi

alertmanager:
  enabled: false

pushgateway:
  enabled: false

kube-state-metrics:
  enabled: false

nodeExporter:
  enabled: false

grafana:
  enabled: false

alertmanagerFiles:
  alertmanager.yml: |-
    # Define alert rules
    groups:
      - name: example
        rules:
          - alert: HighRequestLatency
            expr: job:request_latency_seconds:mean5m{job="myjob"} > 0.5
            for: 10m
            labels:
              severity: page
            annotations:
              summary: High request latency

  serviceAccounts:
    alertmanager:
      automountServiceAccountToken: true

prometheus:
  scrape_configs:
    - job_name: 'api-gateway-microservice'
      metrics_path: /actuator/prometheus
      static_configs:
        - targets:
            - 'localhost:8080'
        # - targets: ['api-gateway-microservice.development.svc.cluster.local:8083']
