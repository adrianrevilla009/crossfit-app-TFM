apiVersion: v1
kind: Service
metadata:
  name: api-gateway-microservice
  namespace: development
  labels:
    app: api-gateway-microservice
spec:
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
      name: api-gateway-microservice-port
  selector:
    app: api-gateway-microservice
  type: NodePort