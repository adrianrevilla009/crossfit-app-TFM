name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Read and Increment Version
        id: version
        run: |
          versionFile="version.txt"
          if [ ! -f $versionFile ]; then
            echo "1" > $versionFile
          fi
          currentVersion=$(cat $versionFile)
          nextVersion=$((currentVersion + 1))
          echo $nextVersion > $versionFile
          echo "::set-output name=version::$nextVersion"  

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Images
        run: |
          services=("api-gateway-microservice" "classes-microservice" "documents-microservice" "security-microservice")

          for service in "${services[@]}"; do
            echo "Current directory: $(pwd)"
            ls -la
            cd $service
            echo "Changed to directory: $(pwd)"
            ls -la
            docker buildx create --use
            docker buildx inspect --bootstrap
            docker buildx build -f dockerfile.Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/$service:latest -t ${{ secrets.DOCKERHUB_USERNAME }}/$service:${{ steps.version.outputs.version }} --push .
            cd ..
          done

