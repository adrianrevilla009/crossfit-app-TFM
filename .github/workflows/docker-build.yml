name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Images
        run: |
          for service in api-gateway-microservice classes-microservice documents-microservice security-microservice; do
            for module in api-gateway-microservice classes-microservice documents-microservice security-microservice; do
              cd $module
              docker buildx create --use
              docker buildx inspect --bootstrap
              docker buildx build -t ***/$module:latest --push .
              cd ..
            done
          done
