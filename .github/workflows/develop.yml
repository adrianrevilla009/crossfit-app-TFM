name: Build and Push Docker Images

on:
  push:
    branches:
      - develop

jobs:
  run-tests:
    name: Run tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api-gateway-microservice

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Maven
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clean and Install Dependencies
        working-directory: ./${{ matrix.service }}
        run: |
            # Da permisos de ejecuciĂłn a mvnw si es necesario
            chmod +x mvnw
            
            # Ejecuta mvn clean install para limpiar e instalar dependencias
            ./mvnw clean install    

      - name: Run Tests
        working-directory: ./${{ matrix.service }}
        run: |
          # Da permisos de ejecuciĂłn a mvnw si es necesario
          chmod +x mvnw
          
          # Ejecuta las pruebas utilizando Maven Wrapper
          ./mvnw test

  build-and-push:
    name: Generate images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Read and Increment Version
        id: version
        run: |
          versionFile="version.txt"
          if [ ! -f $versionFile ]; then
          echo "v1" > $versionFile
          fi
          currentVersion=$(cat $versionFile)
          # Extrae el nĂşmero de versiĂłn sin el prefijo "v"
          currentVersionNumber=$(echo $currentVersion | sed 's/v//')
          nextVersionNumber=$((currentVersionNumber + 1))
          nextVersion="v$nextVersionNumber"
          echo $nextVersion > $versionFile
          
          # Exporta la variable de entorno con la nueva versiĂłn
          echo "VERSION=$nextVersion" >> $GITHUB_ENV

      - name: Acceder a la Variable de Entorno
        run: echo $VERSION

      # This is needed to avoid iterative CI after committing version
      - name: Check if Skip CI
        run: |
          if git log --format=%B -n 1 $GITHUB_SHA | grep -q '\[skip ci\]'; then
            echo "CI skip detected. Exiting..."
            exit 78
          fi

      - name: Commit & Push changes
        uses: devops-infra/action-commit-push@master
        with:
          github_token: "${{ secrets.TOKEN }}"
          add_timestamp: true
          commit_prefix: "[AUTO]"
          commit_message: "Update version to $VERSION [skip ci]"
          force: false
          target_branch: version-${{ steps.version.outputs.VERSION }}

      # Merge to main does not have to be automated
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v3
        with:
          commit-message: "Update version to $VERSION [skip ci]"
          title: "[AUTO] Bump version to $VERSION"
          labels: "auto-merge"
          branch: version-${{ steps.version.outputs.VERSION }}
          delete-branch: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Images
        run: |
          services=("api-gateway-microservice" "classes-microservice" "documents-microservice" "security-microservice")

          for service in "${services[@]}"; do
            echo "Current directory: $(pwd)"
            ls -la
            cd $service
            echo "Changed to directory: $(pwd)"
            ls -la
            docker buildx create --use
            docker buildx inspect --bootstrap
            docker buildx build -f dockerfile.Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/$service:$VERSION --push .
            cd ..
          done

  sonar-cloud:
    name: Analyze code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.

      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Configure Maven settings
        run: |
            mkdir -p ~/.m2
            echo '<settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                  xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 http://maven.apache.org/xsd/settings-1.0.0.xsd">
                  <activeProfiles>
                      <activeProfile>github</activeProfile>
                  </activeProfiles>
                  <profiles>
                      <profile>
                          <id>github</id>
                          <repositories>
                              <repository>
                                  <id>central</id>
                                  <url>https://repo1.maven.org/maven2</url>
                              </repository>
                              <repository>
                                  <id>github</id>
                                  <url>https://maven.pkg.github.com/adrianrevilla009/*</url>
                                  <snapshots>
                                      <enabled>true</enabled>
                                  </snapshots>
                              </repository>
                          </repositories>
                      </profile>
                  </profiles>
                  <servers>
                      <server>
                          <id>github</id>
                          <username>${{ secrets.GITHUB_ACTOR }}</username>
                          <password>${{ secrets.GITHUB_TOKEN }}</password>
                      </server>
                  </servers>
                </settings>' > ~/.m2/settings.xml

      # AnĂˇlisis para el primer subproyecto
      - name: Analyze subproject 1
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B -f api-gateway-microservice/pom.xml verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=adrianrevilla009_crossfit-app-TFM

      # AnĂˇlisis para el segundo subproyecto
      - name: Analyze subproject 2
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B -f classes-microservice/pom.xml verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=adrianrevilla009_crossfit-app-TFM

      # AnĂˇlisis para el tercer subproyecto
      - name: Analyze subproject 3
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B -f documents-microservice/pom.xml verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=adrianrevilla009_crossfit-app-TFM

      # AnĂˇlisis para el cuarto subproyecto
      - name: Analyze subproject 4
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B -f security-microservice/pom.xml verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=adrianrevilla009_crossfit-app-TFM

